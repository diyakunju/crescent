<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bayonetta Theme</title>
  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-image: url("a9fc1c381e53ad9126f291be6c54c4ae.jpg");
  background-size: cover;       /* makes it fill screen */
  background-position: center;  /* keeps it centered */
  background-repeat: no-repeat; /* no repeating */
  color: white;
}

    .header {
      text-align: center;
      padding-top: 40px;
    }

    h2 {
      color: red;
      font-size: 40px;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 50px;
    }

    .left img {
      width: 300px;
      border-radius: 10px;
    }

    .right a {
      background-color: red;
      padding: 15px 25px;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .right a:hover {
      background-color: darkred;
    }
  </style>
</head>
<body>

  <div class="header">
    <h2>Bayonetta Theme</h2>
  </div>

  <div class="container">
    <div class="left">
      <img src="bayonetta.png" alt="Bayonetta Image">
    </div>

    <div class="right">
      <a href="https://drive.google.com/file/d/1OLeS1knShesvpC7WAVNI6VcJyNCxvrg4/view?usp=drive_link">
        Download
      </a>
    </div>
  </div>

</body>
</html>
