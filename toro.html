<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Toro Inoue</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffe5ec; /* soft pink */
    }

    .header {
      text-align: center;
      padding-top: 40px;
    }

    h2 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      padding: 50px;
    }

    .image img {
      width: 300px;
      border-radius: 15px;
    }

    .download-box {
      background-color: #ffb3c1;
      padding: 20px 40px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .download-box:hover {
      background-color: #ff8fab;
    }

    .download-box a {
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      color: black;
    }
  </style>
</head>

<body>

  <div class="header">
    <h2>Toro Inoue Theme</h2>
  </div>

  <div class="container">
    
    <!-- LEFT IMAGE -->
    <div class="image">
      <img src="toro.png" alt="Toro Inoue">
    </div>

    <!-- RIGHT DOWNLOAD -->
    <div class="download-box">
      <a href="https://drive.google.com/file/d/1zup8AuIvYw5ERC9ZkOkxtBNtd8e6HonC/view?usp=drive_link">
        Download
      </a>
    </div>

  </div>

</body>
</html>
