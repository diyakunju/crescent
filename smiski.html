<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smiski</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #d8f3dc;
    }

    h1 {
      text-align: center;
      color: #1b4332;
      margin-top: 30px;
    }

    .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 50px;
    }

    .left img {
      width: 300px;
      border-radius: 10px;
    }

    .right {
      text-align: center;
    }

    .download-box {
      background-color: #b7e4c7;
      padding: 15px 25px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .download-box:hover {
      background-color: #95d5b2;
    }

    .download-box a {
      text-decoration: none;
      color: #081c15;
      font-weight: bold;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1>Smiski</h1>

  <div class="container">
    <!-- LEFT IMAGE -->
    <div class="left">
      <img src="Smiski.png" alt="Smiski Image">
    </div>

    <!-- RIGHT DOWNLOAD -->
    <div class="right">
      <div class="download-box">
        <a href="https://drive.google.com/file/d/1Ca5OrTNttSq4Sma8gp4iWCrua5E2HIlN/view?usp=drive_link" target="_blank">
          <h2>Download</h2>
        </a>
      </div>
    </div>
  </div>

</body>
</html>
