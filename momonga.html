<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Momonga</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #e0fbfc; /* soft blue */
    }

    .header {
      text-align: center;
      padding-top: 40px;
    }

    h2 {
      font-size: 40px;
      margin-bottom: 30px;
      color: #293241;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      padding: 50px;
    }

    .image img {
      width: 300px;
      border-radius: 15px;
    }

    .download-box {
      background-color: #98c1d9;
      padding: 20px 40px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .download-box:hover {
      background-color: #3d5a80;
    }

    .download-box a {
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      color: #ffffff;
    }
  </style>
</head>

<body>

  <div class="header">
    <h2>Momonga Theme</h2>
  </div>

  <div class="container">
    
    <!-- LEFT IMAGE -->
    <div class="image">
      <img src="momonga.png" alt="Momonga">
    </div>

    <!-- RIGHT DOWNLOAD -->
    <div class="download-box">
      <a href="https://drive.google.com/file/d/1huPnEpBmd13dpyMtSHlypbwWlp8YmoZM/view?usp=drive_link">
        Download
      </a>
    </div>

  </div>

</body>
</html>
