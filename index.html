<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DSI Themes</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #d8f3dc; /* pastel green */
    }

    .header {
      text-align: center;
      padding-top: 40px;
    }

    .logo {
      max-width: 300px;
      height: auto;
      margin-bottom: 10px;
    }

    h2 {
      color: #1b4332;
      font-size: 40px;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #2d6a4f;
      margin-bottom: 30px;
    }

    .content {
      display: flex;
      justify-content: flex-end; /* pushes content to the right */
      padding: 0 50px;
    }

    .link-box {
      background-color: #b7e4c7;
      padding: 15px 25px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .link-box:hover {
      background-color: #95d5b2;
    }

    .link-box a {
      text-decoration: none;
      color: #081c15;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="Nintendo dsi themes.png" alt="Nintendo DSi Themes Logo" class="logo">
    <h2>DSI Themes</h2>
    <div class="subtitle">Made by Me</div>
  </div>

  <div class="content">
  <div class="link-box">
    <a href="smiski.html">Smiski</a>
  </div>

  <div class="link-box" style="margin-left: 20px;">
    <a href="bayonetta.html">Bayonetta Theme</a>
  </div>

  <div class="link-box" style="margin-left: 20px;">
    <a href="toro.html">Toro Inoue</a>
  </div>

  <div class="link-box" style="margin-left: 20px;">
    <a href="momonga.html">Momonga</a>
  </div>
</div>

</body>
</html>
